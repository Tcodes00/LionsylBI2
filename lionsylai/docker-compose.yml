version: "3.9"

services:
  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: lionsylai_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass2026}
      MYSQL_DATABASE:      ${DB_NAME:-lionsylai}
      MYSQL_USER:          ${DB_USER:-lionsylai_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-securepass2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootpass2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lionsylai_net

  # ── Redis (session caching) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lionsylai_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lionsylai_net

  # ── LionsylAI Application ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lionsylai_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST:             db
      DB_PORT:             3306
      DB_NAME:             ${DB_NAME:-lionsylai}
      DB_USER:             ${DB_USER:-lionsylai_user}
      DB_PASSWORD:         ${DB_PASSWORD:-securepass2026}
      APP_SECRET_KEY:      ${APP_SECRET_KEY:-change-me-in-production}
      APP_ENV:             ${APP_ENV:-production}
      APP_URL:             ${APP_URL:-http://localhost:8501}
      SENDGRID_API_KEY:    ${SENDGRID_API_KEY:-}
      FROM_EMAIL:          ${FROM_EMAIL:-noreply@lionsylai.com}
      FROM_NAME:           ${FROM_NAME:-LionsylAI}
      SMTP_HOST:           ${SMTP_HOST:-}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASSWORD:       ${SMTP_PASSWORD:-}
      SMTP_USE_TLS:        ${SMTP_USE_TLS:-true}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID:     ${STRIPE_PRICE_ID:-}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWD: ${SSLCOMMERZ_STORE_PASSWD:-}
      SSLCOMMERZ_SANDBOX:  ${SSLCOMMERZ_SANDBOX:-true}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production}
      LOGIN_LOCKOUT_MAX_ATTEMPTS: ${LOGIN_LOCKOUT_MAX_ATTEMPTS:-5}
      LOGIN_LOCKOUT_WINDOW_MIN:   ${LOGIN_LOCKOUT_WINDOW_MIN:-15}
      ENABLE_EMAIL_VERIFY: ${ENABLE_EMAIL_VERIFY:-true}
      ENABLE_PAYMENTS:     ${ENABLE_PAYMENTS:-true}
      MAX_UPLOAD_MB:       ${MAX_UPLOAD_MB:-200}
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    networks:
      - lionsylai_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lionsylai_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - lionsylai_net

volumes:
  mysql_data:
  redis_data:
  nginx_logs:

networks:
  lionsylai_net:
    driver: bridge
